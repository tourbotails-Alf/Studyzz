<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>studyzz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #5f9cff, #8f6ed5); min-height: 100vh; }
        .tab { cursor: pointer; transition: 0.3s; }
        .tab.active { background: white !important; color: #333 !important; }
        
        .card-container { width: 240px; transition: all 0.3s ease; position: relative; z-index: 1; }
        .card-container.expanded { width: 320px; z-index: 100; }
        .study-card { cursor: pointer; transition: transform 0.2s; border-radius: 20px !important; }
        .study-card:hover { transform: translateY(-5px); }
        
        .extra-info { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .card-container.expanded .extra-info { display: block; }
        .card-container.expanded .compact-hide { display: none; }

        .box { max-width: 400px; }
        .study-meta { font-size: 0.85rem; color: #555; font-style: italic; font-weight: 500; }
    </style>
</head>
<body onclick="closeAllCards(event)">

<div class="container py-4">
    <h1 class="text-center text-white fw-bold mb-4">studyzz</h1>

    <div class="d-flex justify-content-center gap-2 flex-wrap mb-4">
        <div class="tab active px-4 py-2 rounded-pill bg-white bg-opacity-25 text-white" onclick="openTab('add')">Add</div>
        <div class="tab px-4 py-2 rounded-pill bg-white bg-opacity-25 text-white" onclick="openTab('list')">Study</div>
        <div class="tab px-4 py-2 rounded-pill bg-white bg-opacity-25 text-white" onclick="openTab('visits')">Visits</div>
        <div class="tab px-4 py-2 rounded-pill bg-white bg-opacity-25 text-white" onclick="openTab('addHours')">Add Hours</div>
        <div class="tab px-4 py-2 rounded-pill bg-white bg-opacity-25 text-white" onclick="openTab('hours')">Hours</div>
    </div>

    <div class="content">
        <div id="add">
            <div class="card box mx-auto p-4 shadow-sm border-0 text-center">
                <h5 class="mb-3">New Study</h5>
                <input id="name" class="form-control mb-3" placeholder="Enter Student Name">
                <button class="btn btn-info text-white w-100" onclick="add()">Save Student</button>
            </div>
        </div>

        <div id="list" style="display:none;">
            <h3 class="text-center text-white mb-3">
                Total Studies: <span id="totalStudies">0</span>
            </h3>
            <div class="d-flex flex-wrap justify-content-center gap-3" id="cards"></div>
        </div>

        <div id="visits" style="display:none;">
            <div class="d-flex justify-content-end mb-3">
                <select id="monthSelect" class="form-select w-auto" onchange="load()"></select>
            </div>
            <h3 class="text-center text-white">Total Visits: <span id="total">0</span></h3>
            <div id="visitList" class="mx-auto" style="max-width: 400px;"></div>
        </div>

        <div id="addHours" style="display:none;">
            <div class="card box mx-auto p-4 shadow-sm border-0">
                <input id="hoursInput" class="form-control mb-3" placeholder="Hours worked">
                <input id="dateInput" class="form-control mb-3" type="date">
                <button class="btn btn-info text-white w-100" onclick="addHours()">Save Hours</button>
            </div>
        </div>

        <div id="hours" style="display:none;">
            <div class="d-flex justify-content-end mb-3">
                <select id="hoursMonth" class="form-select w-auto" onchange="load()"></select>
            </div>
            <h3 class="text-center text-white">Total Hours: <span id="totalHours">0</span></h3>
            <div id="hoursList" class="mx-auto" style="max-width: 400px;"></div>
        </div>
    </div>
</div>

<script>
function getData(){ return JSON.parse(localStorage.getItem("data"))||[]; }
function saveData(d){ localStorage.setItem("data",JSON.stringify(d)); }
function getMonthKey(date){ return date.getFullYear()+"-"+(date.getMonth()+1); }
function getMonthName(key){
    let m = parseInt(key.split("-")[1]) - 1;
    let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return names[m];
}

function toggleCard(event, element) {
    event.stopPropagation();
    const isExpanded = element.parentElement.classList.contains('expanded');
    if (isExpanded) {
        closeAllCards();
    } else {
        closeAllCards();
        element.parentElement.classList.add('expanded');
    }
}

function closeAllCards(event) {
    let expanded = document.querySelector('.card-container.expanded');
    if(expanded) {
        expanded.classList.remove('expanded');
        load(); 
    }
}

function updateStudyInfo(event, index, field) {
    event.stopPropagation();
    let data = getData();
    data[index][field] = event.target.value;
    saveData(data);
}

function add(){
    let n = document.getElementById("name").value.trim();
    if(!n){ alert("Enter name"); return; }
    let d=getData();
    d.push({name:n, visits:{}, last:"Never", book:"", chapter:"0"});
    saveData(d);
    document.getElementById("name").value = "";
    load();
    openTab('list');
}

function del(event, i){
    event.stopPropagation();
    if(confirm("Delete this student?")){
        let d=getData();
        d.splice(i,1);
        saveData(d);
        load();
    }
}

function visit(event, i){
    event.stopPropagation();
    let d=getData();
    let now=new Date();
    let m=getMonthKey(now);
    if(!d[i].visits[m] || !Array.isArray(d[i].visits[m])) d[i].visits[m]=[];
    d[i].visits[m].push(now.toLocaleString());
    d[i].last=now.toLocaleDateString();
    saveData(d); 
    load();
}

function newChapterDone(event, i) {
    event.stopPropagation();
    let d = getData();
    let currentCh = parseInt(d[i].chapter) || 0;
    d[i].chapter = (currentCh + 1).toString();
    
    let now = new Date();
    let m = getMonthKey(now);
    if(!d[i].visits[m] || !Array.isArray(d[i].visits[m])) d[i].visits[m]=[];
    d[i].visits[m].push(`Ch ${d[i].chapter} Completed - ${now.toLocaleString()}`);
    d[i].last = now.toLocaleDateString();
    
    saveData(d);
    load();
}

function addHours(){
    let hrs=parseFloat(document.getElementById("hoursInput").value);
    if(!hrs) return alert("Enter hours");
    let dInput = document.getElementById("dateInput").value;
    let date = dInput ? new Date(dInput) : new Date();
    let m=getMonthKey(date);
    let h=JSON.parse(localStorage.getItem("hours"))||[];
    h.push({date: date.toLocaleDateString(), month:m, hours:hrs});
    localStorage.setItem("hours",JSON.stringify(h));
    load();
}

function load(){
    let data=getData();
    let cards=document.getElementById("cards");
    let visitList=document.getElementById("visitList");
    let total=document.getElementById("total");
    let totalStudies=document.getElementById("totalStudies");
    let monthSelect=document.getElementById("monthSelect");
    
    let h=JSON.parse(localStorage.getItem("hours"))||[];
    let hoursList=document.getElementById("hoursList");
    let totalHours=document.getElementById("totalHours");
    let hoursMonth=document.getElementById("hoursMonth");

    cards.innerHTML=""; visitList.innerHTML=""; hoursList.innerHTML="";
    let now=new Date(); let currentMonth=getMonthKey(now);

    totalStudies.innerText = data.length;

    data.forEach((d,i)=>{
        cards.innerHTML+=`
        <div class="card-container" id="cont-${i}">
            <div class="card study-card p-3 shadow-sm border-0 text-center" onclick="toggleCard(event, this)">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="mx-auto mb-2" style="width: 50px;">
                <div class="fw-bold text-truncate">${d.name}</div>
                
                <div class="study-meta mb-2">
                    ${d.book ? d.book : 'No Book'} <br> Ch: ${d.chapter || 0}
                </div>
                
                <div class="compact-hide">
                    <button class="btn btn-primary btn-sm w-100 mb-1" onclick="newChapterDone(event, ${i})">New Chapter Done</button>
                    <button class="btn btn-success btn-sm w-100 mb-1" onclick="visit(event, ${i})">Visited</button>
                    <button class="btn btn-danger btn-sm w-100" onclick="del(event, ${i})">Delete</button>
                </div>

                <div class="extra-info text-start" onclick="event.stopPropagation()">
                    <label class="small fw-bold">Book Name:</label>
                    <input class="form-control form-control-sm mb-2" value="${d.book||''}" 
                        oninput="updateStudyInfo(event, ${i}, 'book')" placeholder="Ex: Enjoy Life Forever">
                    
                    <label class="small fw-bold">Chapter No:</label>
                    <input class="form-control form-control-sm mb-3" type="number" value="${d.chapter||'0'}" 
                        oninput="updateStudyInfo(event, ${i}, 'chapter')" placeholder="Ex: 5">
                    
                    <button class="btn btn-danger btn-sm w-100" onclick="del(event, ${i})">Delete Study</button>
                </div>
            </div>
        </div>`;
    });

    let months=new Set();
    data.forEach(d=>Object.keys(d.visits||{}).forEach(m=>months.add(m)));
    let arr=[...months]; if(arr.length===0) arr=[currentMonth];
    let prevMonth = monthSelect.value;
    monthSelect.innerHTML="";
    arr.forEach(m=>{
        let o=document.createElement("option"); o.value=m; o.text=getMonthName(m);
        monthSelect.appendChild(o);
    });
    monthSelect.value = prevMonth || arr[0];

    let sel=monthSelect.value, totalV=0;
    data.forEach((d, idx)=>{
        let vData = d.visits[sel]||[];
        let count = Array.isArray(vData) ? vData.length : 0;
        totalV+=count;
        let detailsHtml = Array.isArray(vData) ? vData.map(v => `<li>${v}</li>`).join('') : "";
        visitList.innerHTML+=`
        <div class="bg-white p-3 rounded mb-2 shadow-sm" style="cursor:pointer" onclick="event.stopPropagation(); let el=document.getElementById('det-${idx}'); el.style.display=(el.style.display==='block'?'none':'block')">
            <div class="d-flex justify-content-between align-items-center">
                <b>${d.name}</b>
                <span class="badge bg-primary rounded-pill">${count}</span>
            </div>
            <div id="det-${idx}" style="display:none;" class="border-top mt-2 pt-2 small text-muted">
                <ul class="mb-0 ps-3">${detailsHtml || "No logs"}</ul>
            </div>
        </div>`;
    });
    total.innerText=totalV;

    let hMonths=new Set(h.map(x=>x.month));
    let hArr=[...hMonths]; if(hArr.length===0) hArr=[currentMonth];
    let prevHMonth = hoursMonth.value;
    hoursMonth.innerHTML="";
    hArr.forEach(m=>{
        let o=document.createElement("option"); o.value=m; o.text=getMonthName(m);
        hoursMonth.appendChild(o);
    });
    hoursMonth.value = prevHMonth || hArr[0];
    let hSel=hoursMonth.value, totalH=0;
    h.forEach((item,i)=>{
        if(item.month===hSel){
            totalH+=item.hours;
            hoursList.innerHTML+=`
            <div class="bg-white p-3 rounded mb-2 shadow-sm d-flex justify-content-between align-items-center">
                <span>${item.date} - <b>${item.hours} hrs</b></span>
                <button class="btn btn-danger btn-sm" onclick="let hx=JSON.parse(localStorage.getItem('hours')); hx.splice(${i},1); localStorage.setItem('hours',JSON.stringify(hx)); load();">Delete</button>
            </div>`;
        }
    });
    totalHours.innerText=totalH;
}

function openTab(tab){
    ["add","list","visits","addHours","hours"].forEach(id=>{
        document.getElementById(id).style.display="none";
    });
    document.getElementById(tab).style.display="block";
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    if(event) event.currentTarget.classList.add("active");
}

load();
</script>
</body>
</html>
